<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="健康日记">
<meta name="theme-color" content="#4F8EF7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>健康日记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --primary: #4F8EF7;
  --primary-light: #EBF2FF;
  --secondary: #FF6B6B;
  --secondary-light: #FFF0F0;
  --green: #34C759;
  --green-light: #EDFFF3;
  --orange: #FF9500;
  --orange-light: #FFF5E6;
  --red: #FF3B30;
  --gray-100: #F5F7FA;
  --gray-200: #EBEBEB;
  --gray-400: #BDBDBD;
  --gray-600: #757575;
  --gray-800: #333333;
  --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--gray-100);
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  color: var(--gray-800);
}

/* ===== 页面框架 ===== */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

.page {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.page.active { display: flex; }

.page-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 16px 16px calc(16px + var(--safe-bottom));
}
.page-scroll::-webkit-scrollbar { display: none; }

/* ===== 状态栏占位 ===== */
.status-placeholder {
  height: env(safe-area-inset-top, 44px);
  background: var(--white);
  flex-shrink: 0;
}

/* ===== 顶部导航 ===== */
.top-nav {
  background: var(--white);
  padding: 12px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
.top-nav h1 { font-size: 20px; font-weight: 800; }
.top-nav .sub { font-size: 12px; color: var(--gray-400); font-weight: 500; margin-bottom: 2px; }

.nav-action {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; border: none;
  color: var(--gray-800);
}

.back-nav {
  background: var(--white);
  padding: 12px 16px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
.back-nav h1 { font-size: 18px; font-weight: 700; }
.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%; background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; border: none; color: var(--gray-800);
}

/* ===== 底部导航 ===== */
.bottom-nav {
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  display: flex;
  padding-top: 8px;
  padding-bottom: calc(8px + var(--safe-bottom));
  flex-shrink: 0;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer; padding: 4px;
}
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--gray-400); }
.nav-item.active .nav-label { color: var(--primary); }

/* ===== 卡片 ===== */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.card-title {
  font-size: 15px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}

/* ===== 今日数值卡 ===== */
.today-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.stat-card {
  border-radius: var(--radius-sm); padding: 14px;
  position: relative; overflow: hidden; cursor: pointer;
}
.stat-card.blood-sugar { background: linear-gradient(135deg, #FF6B6B, #FF8E53); }
.stat-card.blood-pressure { background: linear-gradient(135deg, #4F8EF7, #7B61FF); }
.stat-card .s-label { font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 6px; font-weight: 500; }
.stat-card .s-value { font-size: 26px; font-weight: 800; color: white; line-height: 1; }
.stat-card .s-unit { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 4px; }
.stat-card .s-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.25); border-radius: 20px;
  padding: 2px 8px; font-size: 10px; color: white; font-weight: 600;
}
.stat-card .s-add {
  margin-top: 8px; background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: white; display: inline-block;
}

/* ===== 日历 ===== */
.cal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.cal-nav {
  width: 28px; height: 28px; background: var(--gray-100);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--gray-600); border: none;
}
.cal-month { font-size: 15px; font-weight: 700; }
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px;
}
.cal-weekdays span {
  text-align: center; font-size: 11px; color: var(--gray-400); font-weight: 600; padding: 3px 0;
}
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

.day-cell {
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; cursor: pointer; padding: 4px 1px;
  min-height: 54px; transition: background 0.1s;
}
.day-cell:active { opacity: 0.7; }
.day-num { font-size: 12px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
.day-cell.other-month .day-num { color: var(--gray-400); }
.day-cell.today { background: var(--primary); }
.day-cell.today .day-num { color: white; }
.day-cell.selected { background: var(--primary-light); border: 2px solid var(--primary); }
.day-vals { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.day-val-s { font-size: 9px; font-weight: 700; color: var(--secondary); line-height: 1.2; }
.day-val-p { font-size: 8px; font-weight: 700; color: var(--primary); line-height: 1.2; }
.day-cell.today .day-val-s,
.day-cell.today .day-val-p { color: rgba(255,255,255,0.9); }

.sel-data {
  background: var(--gray-100); border-radius: var(--radius-sm);
  padding: 12px; margin-top: 10px;
  display: flex; align-items: center; gap: 8px;
}
.sel-item { flex: 1; text-align: center; }
.sel-item .k { font-size: 10px; color: var(--gray-600); margin-bottom: 3px; }
.sel-item .v { font-size: 17px; font-weight: 800; }
.sel-item .v.s { color: var(--secondary); }
.sel-item .v.p { color: var(--primary); }
.sel-item .u { font-size: 9px; color: var(--gray-400); margin-top: 1px; }
.divider-v { width: 1px; height: 32px; background: var(--gray-200); flex-shrink: 0; }

/* ===== 图表 ===== */
.chart-tabs {
  display: flex; background: var(--gray-100);
  border-radius: 10px; padding: 3px; margin-bottom: 12px; gap: 2px;
}
.chart-tab {
  flex: 1; padding: 6px; text-align: center; font-size: 12px;
  font-weight: 600; color: var(--gray-600); border-radius: 8px; cursor: pointer;
}
.chart-tab.active {
  background: var(--white); color: var(--primary);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.chart-area { height: 130px; margin-bottom: 6px; }
.chart-area svg { width: 100%; height: 100%; overflow: visible; }
.chart-x-labels { display: flex; justify-content: space-between; padding: 0 2px; }
.chart-x-labels span { font-size: 9px; color: var(--gray-400); }
.chart-legend { display: flex; gap: 14px; margin-top: 8px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-600); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ===== FAB ===== */
.fab {
  position: absolute; right: 16px;
  bottom: calc(72px + var(--safe-bottom));
  width: 50px; height: 50px;
  background: linear-gradient(135deg, var(--primary), #7B61FF);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: white; box-shadow: 0 4px 16px rgba(79,142,247,0.5);
  cursor: pointer; border: none; z-index: 50;
}

/* ===== 弹窗 ===== */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; z-index: 200; align-items: flex-end;
}
.overlay.show { display: flex; }
.sheet {
  background: white; border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  width: 100%; animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.sheet-handle {
  width: 40px; height: 4px; background: var(--gray-200);
  border-radius: 2px; margin: 0 auto 18px;
}
.sheet-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; text-align: center; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--gray-600); font-weight: 600; margin-bottom: 6px; display: block; }
.form-row { display: flex; gap: 8px; align-items: center; }
.form-input {
  flex: 1; background: var(--gray-100); border: 2px solid transparent;
  border-radius: var(--radius-sm); padding: 11px 14px; font-size: 18px;
  font-weight: 700; color: var(--gray-800); text-align: center; outline: none;
  transition: border-color 0.15s; width: 100%;
}
.form-input:focus { border-color: var(--primary); background: var(--primary-light); }
.form-input.sm { font-size: 15px; }
.form-unit { font-size: 12px; color: var(--gray-600); font-weight: 600; white-space: nowrap; }
.form-select {
  flex: 1; background: var(--gray-100); border: 2px solid transparent;
  border-radius: var(--radius-sm); padding: 11px 14px; font-size: 14px;
  font-weight: 600; color: var(--gray-800); outline: none; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.form-select:focus { border-color: var(--primary); }

.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--primary), #7B61FF);
  color: white; border: none; border-radius: var(--radius-sm);
  padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px;
}
.btn-primary:active { opacity: 0.85; }
.btn-danger {
  width: 100%; background: var(--gray-100); color: var(--red);
  border: none; border-radius: var(--radius-sm);
  padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;
}

/* ===== 用药页 ===== */
.progress-wrap {
  background: var(--white); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow); margin-bottom: 14px;
}
.progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-title { font-size: 13px; font-weight: 700; }
.progress-count { font-size: 12px; color: var(--gray-600); }
.progress-bar { height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--green));
  border-radius: 4px; transition: width 0.4s;
}

.timeline { display: flex; flex-direction: column; }
.t-block { display: flex; gap: 12px; }
.t-axis { display: flex; flex-direction: column; align-items: center; width: 44px; flex-shrink: 0; }
.t-time {
  font-size: 11px; font-weight: 700; color: var(--gray-600);
  background: var(--gray-100); border-radius: 8px; padding: 3px 5px; white-space: nowrap;
}
.t-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary); border: 2px solid white;
  box-shadow: 0 0 0 2px var(--primary); margin-top: 6px; flex-shrink: 0;
}
.t-dot.done { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
.t-dot.pending { background: var(--orange); box-shadow: 0 0 0 2px var(--orange); }
.t-dot.future { background: var(--gray-400); box-shadow: 0 0 0 2px var(--gray-400); }
.t-line { flex: 1; width: 2px; background: var(--gray-200); margin: 3px 0; min-height: 12px; }

.t-meds { flex: 1; padding-bottom: 16px; padding-top: 2px; display: flex; flex-direction: column; gap: 8px; }
.t-status { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.t-status.done { color: var(--green); }
.t-status.pending { color: var(--orange); }
.t-status.future { color: var(--gray-400); }

.med-item {
  background: var(--white); border-radius: var(--radius-sm);
  padding: 11px 12px; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: all 0.15s;
}
.med-item:active { transform: scale(0.98); }
.med-item.done { border-color: var(--green); background: var(--green-light); }
.med-item.future { opacity: 0.6; }

.med-icon {
  width: 38px; height: 38px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.med-icon.c0 { background: var(--secondary-light); }
.med-icon.c1 { background: var(--primary-light); }
.med-icon.c2 { background: var(--orange-light); }
.med-icon.c3 { background: var(--green-light); }

.med-info { flex: 1; min-width: 0; }
.med-name { font-size: 13px; font-weight: 700; margin-bottom: 1px; }
.med-desc { font-size: 11px; color: var(--gray-600); }
.med-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent; flex-shrink: 0; transition: all 0.2s;
}
.med-item.done .med-check { background: var(--green); border-color: var(--green); color: white; }
.med-arrow { font-size: 16px; color: var(--gray-400); flex-shrink: 0; }

.add-med-btn {
  width: 100%; background: var(--white); border: 2px dashed var(--gray-200);
  border-radius: var(--radius-sm); padding: 14px; font-size: 14px;
  font-weight: 600; color: var(--gray-400); cursor: pointer; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-med-btn:active { background: var(--gray-100); }

/* ===== 药品详情 ===== */
.drug-hero {
  background: linear-gradient(160deg, #4F8EF7, #7B61FF);
  padding: calc(env(safe-area-inset-top, 20px) + 50px) 20px 28px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.drug-hero-icon {
  width: 76px; height: 76px; background: rgba(255,255,255,0.2);
  border-radius: 22px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: 12px;
}
.drug-hero-name { font-size: 20px; font-weight: 800; color: white; margin-bottom: 4px; }
.drug-hero-sub { font-size: 12px; color: rgba(255,255,255,0.7); }
.drug-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
.drug-tag {
  background: rgba(255,255,255,0.2); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: white; font-weight: 600;
}
.drug-back {
  position: absolute; top: calc(env(safe-area-inset-top, 20px) + 12px); left: 14px;
  width: 34px; height: 34px; background: rgba(255,255,255,0.25);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: white; cursor: pointer; border: none; z-index: 10;
}

.info-sec { padding: 0 16px 4px; }
.info-sec h3 { font-size: 15px; font-weight: 800; margin: 16px 0 10px; }
.info-sec p { font-size: 13px; color: var(--gray-600); line-height: 1.7; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-cell { background: var(--gray-100); border-radius: var(--radius-sm); padding: 10px; }
.info-cell .k { font-size: 10px; color: var(--gray-400); margin-bottom: 3px; }
.info-cell .v { font-size: 13px; font-weight: 700; }
.warn-box {
  background: #FFF8E1; border-left: 3px solid var(--orange);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 11px 12px; margin-top: 10px;
}
.warn-box .wt { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 4px; }
.warn-box .wb { font-size: 12px; color: var(--gray-600); line-height: 1.6; }

.buy-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.buy-item {
  border-radius: var(--radius-sm); padding: 13px; display: flex;
  align-items: center; gap: 12px; cursor: pointer; border: none; width: 100%; text-align: left;
}
.buy-item:active { opacity: 0.8; }
.buy-item.primary { background: linear-gradient(135deg, var(--primary), #7B61FF); color: white; }
.buy-item.secondary { background: var(--gray-100); color: var(--gray-800); border: 1px solid var(--gray-200); }
.buy-icon { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.buy-item.secondary .buy-icon { background: white; }
.buy-info { flex: 1; }
.buy-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.buy-sub { font-size: 11px; opacity: 0.75; }
.buy-arrow { font-size: 17px; opacity: 0.6; }

/* ===== 空状态 ===== */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 32px 20px; color: var(--gray-400);
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 13px; }

/* ===== Toast ===== */
#toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">

  <!-- ========== 记录页 ========== -->
  <div class="page active" id="pageRecord">
    <div class="status-placeholder"></div>
    <div class="top-nav">
      <div>
        <div class="sub">你好，健康达人</div>
        <h1>健康日记</h1>
      </div>
      <button class="nav-action" onclick="openAddData()">＋</button>
    </div>
    <div class="page-scroll">

      <!-- 今日数值 -->
      <div class="today-stats">
        <div class="stat-card blood-sugar" onclick="openAddData('sugar')">
          <div class="s-label">今日血糖</div>
          <div class="s-value" id="todaySugar">--</div>
          <div class="s-unit">mmol/L</div>
          <div class="s-badge" id="todaySugarBadge"></div>
          <div class="s-add">+ 录入</div>
        </div>
        <div class="stat-card blood-pressure" onclick="openAddData('pressure')">
          <div class="s-label">今日血压</div>
          <div class="s-value" id="todayPressure">--</div>
          <div class="s-unit">mmHg</div>
          <div class="s-badge" id="todayPressureBadge"></div>
          <div class="s-add">+ 录入</div>
        </div>
      </div>

      <!-- 日历 -->
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month" id="calMonth"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="cal-days" id="calDays"></div>
        <div class="sel-data" id="selData">
          <div class="sel-item">
            <div class="k">血糖</div>
            <div class="v s" id="selSugar">--</div>
            <div class="u">mmol/L</div>
          </div>
          <div class="divider-v"></div>
          <div class="sel-item">
            <div class="k">收缩压</div>
            <div class="v p" id="selSys">--</div>
            <div class="u">mmHg</div>
          </div>
          <div class="divider-v"></div>
          <div class="sel-item">
            <div class="k">舒张压</div>
            <div class="v p" id="selDia">--</div>
            <div class="u">mmHg</div>
          </div>
          <button class="nav-action" style="width:28px;height:28px;font-size:14px;flex-shrink:0"
            id="selEditBtn" onclick="openEditSelected()" title="编辑" hidden>✏️</button>
        </div>
      </div>

<div id="toast"></div>

<script>
// ===== 工具函数 =====
const $ = id => document.getElementById(id);
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
};
const dateKey = (y, m, d) => `${y}-${m}-${d}`;

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== 数据存储 =====
// healthData: { 'YYYY-M-D': { sugar, sys, dia } }
// meds: [ { id, name, desc, time, type, icon } ]
// checkLog: { 'YYYY-M-D': { medId: true/false } }

function loadData() {
  return JSON.parse(localStorage.getItem('healthData') || '{}');
}
function saveData(data) {
  localStorage.setItem('healthData', JSON.stringify(data));
}
function loadMeds() {
  return JSON.parse(localStorage.getItem('meds') || '[]');
}
function saveMeds(meds) {
  localStorage.setItem('meds', JSON.stringify(meds));
}
function loadCheckLog() {
  return JSON.parse(localStorage.getItem('checkLog') || '{}');
}
function saveCheckLog(log) {
  localStorage.setItem('checkLog', JSON.stringify(log));
}

// ===== 页面切换 =====
let currentPage = 'record';
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  currentPage = name;
  if (name === 'record') refreshRecord();
  if (name === 'med') renderMedPage();
}

function goBack() {
  switchPage(currentPage === 'detail' ? 'med' : 'record');
}

// ===== 记录页 =====
let calYear, calMonth, calSelected;

function refreshRecord() {
  const now = new Date();
  if (!calYear) calYear = now.getFullYear();
  if (!calMonth) calMonth = now.getMonth() + 1;
  if (!calSelected) calSelected = now.getDate();
  updateTodayCards();
  renderCalendar();
  updateSelected();
  drawChart(activeChart);
}

function updateTodayCards() {
  const data = loadData();
  const key = today();
  const d = data[key];
  if (d && d.sugar != null) {
    $('todaySugar').textContent = d.sugar;
    const badge = $('todaySugarBadge');
    if (d.sugar < 3.9) badge.textContent = '偏低';
    else if (d.sugar > 7.8) badge.textContent = '偏高';
    else badge.textContent = '正常';
  } else {
    $('todaySugar').textContent = '--';
    $('todaySugarBadge').textContent = '';
  }
  if (d && d.sys != null) {
    $('todayPressure').innerHTML = `${d.sys}<span style="font-size:15px">/${d.dia}</span>`;
    const badge = $('todayPressureBadge');
    if (d.sys >= 140 || d.dia >= 90) badge.textContent = '偏高';
    else if (d.sys < 90) badge.textContent = '偏低';
    else badge.textContent = '正常';
  } else {
    $('todayPressure').textContent = '--';
    $('todayPressureBadge').textContent = '';
  }
}

function renderCalendar() {
  const now = new Date();
  $('calMonth').textContent = `${calYear}年${calMonth}月`;
  const container = $('calDays');
  container.innerHTML = '';
  const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  const lastDate = new Date(calYear, calMonth, 0).getDate();
  const prevLast = new Date(calYear, calMonth - 1, 0).getDate();
  const data = loadData();

  // 上月补位
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month';
    cell.innerHTML = `<div class="day-num">${prevLast - firstDay + i + 1}</div>`;
    container.appendChild(cell);
  }

  for (let d = 1; d <= lastDate; d++) {
    const key = dateKey(calYear, calMonth, d);
    const rec = data[key];
    const isToday = calYear === now.getFullYear() && calMonth === now.getMonth()+1 && d === now.getDate();
    const isSel = d === calSelected && calYear === now.getFullYear() && calMonth === now.getMonth()+1 || false;

    const cell = document.createElement('div');
    let cls = 'day-cell';
    if (isToday) cls += ' today';
    // selected only same year/month
    if (d === calSelected && !isToday) cls += ' selected';
    cell.className = cls;

    let valsHtml = '';
    if (rec) {
      const s = rec.sugar != null ? `<div class="day-val-s">${rec.sugar}</div>` : '';
      const p = rec.sys != null ? `<div class="day-val-p">${rec.sys}/${rec.dia}</div>` : '';
      if (s || p) valsHtml = `<div class="day-vals">${s}${p}</div>`;
    }
    cell.innerHTML = `<div class="day-num">${d}</div>${valsHtml}`;
    cell.onclick = () => selectDay(d);
    container.appendChild(cell);
  }
}

function selectDay(d) {
  calSelected = d;
  renderCalendar();
  updateSelected();
}

function updateSelected() {
  const data = loadData();
  const key = dateKey(calYear, calMonth, calSelected);
  const rec = data[key];
  $('selSugar').textContent = rec && rec.sugar != null ? rec.sugar : '--';
  $('selSys').textContent = rec && rec.sys != null ? rec.sys : '--';
  $('selDia').textContent = rec && rec.dia != null ? rec.dia : '--';
  $('selEditBtn').hidden = !rec;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1) { calMonth = 12; calYear--; }
  renderCalendar();
}

// ===== 录入数据弹窗 =====
let addDataMode = 'both'; // 'sugar' | 'pressure' | 'both'
let editingDate = null;

function openAddData(mode) {
  addDataMode = mode || 'both';
  editingDate = null;
  const data = loadData();
  const key = today();
  const rec = data[key] || {};

  $('dataSheetTitle').textContent = mode === 'sugar' ? '录入血糖' : mode === 'pressure' ? '录入血压' : '录入今日数据';
  $('sugarGroup').style.display = (mode === 'pressure') ? 'none' : 'block';
  $('pressureGroup').style.display = (mode === 'sugar') ? 'none' : 'block';
  $('inputSugar').value = rec.sugar || '';
  $('inputSys').value = rec.sys || '';
  $('inputDia').value = rec.dia || '';
  $('deleteDataBtn').hidden = !rec.sugar && !rec.sys;
  $('overlayData').classList.add('show');

  setTimeout(() => {
    if (mode !== 'pressure') $('inputSugar').focus();
    else $('inputSys').focus();
  }, 300);
}

function openEditSelected() {
  const key = dateKey(calYear, calMonth, calSelected);
  const data = loadData();
  const rec = data[key] || {};
  editingDate = key;
  addDataMode = 'both';
  $('dataSheetTitle').textContent = `编辑 ${calYear}年${calMonth}月${calSelected}日`;
  $('sugarGroup').style.display = 'block';
  $('pressureGroup').style.display = 'block';
  $('inputSugar').value = rec.sugar || '';
  $('inputSys').value = rec.sys || '';
  $('inputDia').value = rec.dia || '';
  $('deleteDataBtn').hidden = false;
  $('overlayData').classList.add('show');
}

function saveHealthData() {
  const key = editingDate || today();
  const data = loadData();
  if (!data[key]) data[key] = {};

  const sugarVal = parseFloat($('inputSugar').value);
  const sysVal = parseInt($('inputSys').value);
  const diaVal = parseInt($('inputDia').value);

  if (addDataMode !== 'pressure' && !isNaN(sugarVal)) {
    data[key].sugar = sugarVal;
  }
  if (addDataMode !== 'sugar' && !isNaN(sysVal) && !isNaN(diaVal)) {
    data[key].sys = sysVal;
    data[key].dia = diaVal;
  }

  // 如果什么都没填
  if (!data[key].sugar && !data[key].sys) {
    showToast('请至少填写一项数据');
    return;
  }

  saveData(data);
  $('overlayData').classList.remove('show');
  showToast('已保存');
  updateTodayCards();
  renderCalendar();
  updateSelected();
  drawChart(activeChart);
}

function deleteHealthData() {
  const key = editingDate || today();
  const data = loadData();
  delete data[key];
  saveData(data);
  $('overlayData').classList.remove('show');
  showToast('已删除');
  updateTodayCards();
  renderCalendar();
  updateSelected();
  drawChart(activeChart);
}

// ===== 图表 =====
let activeChart = 'sugar';

function switchChart(type) {
  activeChart = type;
  ['sugar', 'pressure'].forEach(t => {
    $('tab-' + t).className = 'chart-tab' + (t === type ? ' active' : '');
  });
  drawChart(type);
}

function drawChart(type) {
  const data = loadData();
  // 取最近14天
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    days.push({ key, label, rec: data[key] || null });
  }

  // 只取有数据的点
  const points = days.filter(d => d.rec && (type === 'sugar' ? d.rec.sugar != null : d.rec.sys != null));

  const svg = $('chartSvg');
  const labelsEl = $('chartLabels');
  const legendEl = $('chartLegend');

  if (points.length < 2) {
    svg.innerHTML = `<text x="160" y="60" text-anchor="middle" font-size="12" fill="#BDBDBD">数据不足，继续记录后显示趋势</text>`;
    labelsEl.innerHTML = '';
    legendEl.innerHTML = '';
    return;
  }

  const W = 320, H = 120;
  const padL = 8, padR = 8, padT = 14, padB = 10;
  const w = W - padL - padR, h = H - padT - padB;
  const n = points.length;

  const xPos = i => padL + (i / (n - 1)) * w;

  let html = '';
  let legendHtml = '';

  if (type === 'sugar') {
    const vals = points.map(p => p.rec.sugar);
    const minV = Math.min(...vals, 3.9), maxV = Math.max(...vals, 7.8);
    const range = maxV - minV || 4;
    const yPos = v => padT + h - ((v - minV) / range) * h;

    // 参考范围
    const ry1 = yPos(7.8), ry2 = yPos(3.9);
    html += `<rect x="${padL}" y="${ry1}" width="${w}" height="${ry2-ry1}" fill="rgba(52,199,89,0.08)"/>`;
    html += `<line x1="${padL}" y1="${ry1}" x2="${padL+w}" y2="${ry1}" stroke="rgba(52,199,89,0.4)" stroke-width="1" stroke-dasharray="4,3"/>`;
    html += `<line x1="${padL}" y1="${ry2}" x2="${padL+w}" y2="${ry2}" stroke="rgba(52,199,89,0.4)" stroke-width="1" stroke-dasharray="4,3"/>`;

    // 面积
    const areaPath = vals.map((v, i) => `${i===0?'M':'L'}${xPos(i)},${yPos(v)}`).join(' ') +
      ` L${xPos(n-1)},${padT+h} L${xPos(0)},${padT+h} Z`;
    html += `<defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.35"/><stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/></linearGradient></defs>`;
    html += `<path d="${areaPath}" fill="url(#g1)"/>`;
    const linePath = vals.map((v, i) => `${i===0?'M':'L'}${xPos(i)},${yPos(v)}`).join(' ');
    html += `<path d="${linePath}" fill="none" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    vals.forEach((v, i) => {
      const last = i === n-1;
      html += `<circle cx="${xPos(i)}" cy="${yPos(v)}" r="${last?5:3}" fill="${last?'#FF6B6B':'white'}" stroke="#FF6B6B" stroke-width="2"/>`;
      if (last) html += `<text x="${xPos(i)}" y="${yPos(v)-8}" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">${v}</text>`;
    });
    legendHtml = `<div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div><span>血糖 mmol/L</span></div>`;

  } else {
    const sysVals = points.map(p => p.rec.sys);
    const diaVals = points.map(p => p.rec.dia);
    const allVals = [...sysVals, ...diaVals];
    const minV = Math.min(...allVals, 60), maxV = Math.max(...allVals, 160);
    const range = maxV - minV || 100;
    const yPos = v => padT + h - ((v - minV) / range) * h;

    html += `<defs>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4F8EF7" stop-opacity="0.3"/><stop offset="100%" stop-color="#4F8EF7" stop-opacity="0"/></linearGradient>
      <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7B61FF" stop-opacity="0.2"/><stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/></linearGradient>
    </defs>`;

    const makeArea = (vals, grad) => {
      const line = vals.map((v,i) => `${i===0?'M':'L'}${xPos(i)},${yPos(v)}`).join(' ');
      return `<path d="${line} L${xPos(n-1)},${padT+h} L${xPos(0)},${padT+h} Z" fill="url(#${grad})"/>`;
    };
    const makeLine = (vals, color) => {
      const d = vals.map((v,i) => `${i===0?'M':'L'}${xPos(i)},${yPos(v)}`).join(' ');
      return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    };

    html += makeArea(sysVals, 'g2') + makeArea(diaVals, 'g3');
    html += makeLine(diaVals, '#7B61FF') + makeLine(sysVals, '#4F8EF7');

    sysVals.forEach((v, i) => {
      const last = i === n-1;
      html += `<circle cx="${xPos(i)}" cy="${yPos(v)}" r="${last?5:3}" fill="${last?'#4F8EF7':'white'}" stroke="#4F8EF7" stroke-width="2"/>`;
      if (last) html += `<text x="${xPos(i)}" y="${yPos(v)-8}" text-anchor="middle" font-size="10" font-weight="700" fill="#4F8EF7">${v}</text>`;
    });
    legendHtml = `<div class="legend-item"><div class="legend-dot" style="background:#4F8EF7"></div><span>收缩压</span></div>
                  <div class="legend-item"><div class="legend-dot" style="background:#7B61FF"></div><span>舒张压</span></div>`;
  }

  svg.innerHTML = html;

  // X轴标签：显示首、中、尾
  const showIdx = new Set([0, Math.floor((n-1)/2), n-1]);
  labelsEl.innerHTML = points.map((p, i) =>
    showIdx.has(i) ? `<span>${p.label}</span>` : '<span></span>'
  ).join('');
  legendEl.innerHTML = legendHtml;
}

// ===== 用药页 =====
const MED_ICONS = ['💊','💙','🔶','🟢'];
const MED_COLORS = ['c0','c1','c2','c3'];
const TYPE_LABELS = { sugar:'控血糖', pressure:'降血压', lipid:'调血脂', other:'其他' };
const TIME_LABELS = {
  '08:00':'早餐后', '12:00':'午餐后', '19:00':'晚餐后', '22:00':'睡前'
};

function getTimeLabel(t) {
  return TIME_LABELS[t] || t;
}

function renderMedPage() {
  const meds = loadMeds();
  const log = loadCheckLog();
  const todayKey = today();
  const todayLog = log[todayKey] || {};
  const timeline = $('medTimeline');
  timeline.innerHTML = '';

  if (meds.length === 0) {
    timeline.innerHTML = `<div class="empty-state"><div class="icon">💊</div><p>还没有添加药品，点击右上角＋号添加</p></div>`;
    $('medProgressText').textContent = '0 / 0 已完成';
    $('progressFill').style.width = '0%';
    return;
  }

  // 按时间分组
  const groups = {};
  meds.forEach(m => {
    if (!groups[m.time]) groups[m.time] = [];
    groups[m.time].push(m);
  });
  const sortedTimes = Object.keys(groups).sort();

  // 计算进度
  let total = meds.length, done = 0;
  meds.forEach(m => { if (todayLog[m.id]) done++; });
  $('medProgressText').textContent = `${done} / ${total} 已完成`;
  $('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';

  // 当前时间判断
  const nowH = new Date().getHours() * 60 + new Date().getMinutes();

  sortedTimes.forEach((time, idx) => {
    const [hh, mm] = time.split(':').map(Number);
    const tMin = hh * 60 + mm;
    const isPast = tMin + 30 < nowH; // 过了30分钟算"待服用"
    const isCurrent = Math.abs(tMin - nowH) <= 90;

    let dotClass = 'future', statusClass = 'future', statusText = '· 未到时间';
    const groupMeds = groups[time];
    const allDone = groupMeds.every(m => todayLog[m.id]);

    if (allDone) { dotClass = 'done'; statusClass = 'done'; statusText = '✓ 已完成'; }
    else if (isPast || isCurrent) { dotClass = 'pending'; statusClass = 'pending'; statusText = '· 待服用'; }

    const block = document.createElement('div');
    block.className = 't-block';
    block.innerHTML = `
      <div class="t-axis">
        <div class="t-time">${time}</div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center">
          <div class="t-dot ${dotClass}"></div>
          ${idx < sortedTimes.length - 1 ? '<div class="t-line"></div>' : ''}
        </div>
      </div>
      <div class="t-meds">
        <div class="t-status ${statusClass}">${getTimeLabel(time)} ${statusText}</div>
        ${groupMeds.map(m => renderMedItem(m, todayLog[m.id], dotClass === 'future')).join('')}
      </div>`;
    timeline.appendChild(block);
  });
}

function renderMedItem(m, isDone, isFuture) {
  const iconIdx = m.id % 4;
  return `<div class="med-item ${isDone?'done':''} ${isFuture?'future':''}"
    onclick="toggleMedCheck('${m.id}',${isFuture})">
    <div class="med-icon ${MED_COLORS[iconIdx]}">${MED_ICONS[iconIdx]}</div>
    <div class="med-info">
      <div class="med-name">${m.name}</div>
      <div class="med-desc">${m.desc} · ${TYPE_LABELS[m.type]||''}</div>
    </div>
    <div class="med-check">✓</div>
    <div class="med-arrow" onclick="event.stopPropagation();openDetailPage('${m.id}')">›</div>
  </div>`;
}

function toggleMedCheck(medId, isFuture) {
  const log = loadCheckLog();
  const todayKey = today();
  if (!log[todayKey]) log[todayKey] = {};
  log[todayKey][medId] = !log[todayKey][medId];
  saveCheckLog(log);
  renderMedPage();
}

// ===== 添加/编辑药品弹窗 =====
let editingMedId = null;

function openAddMed(medId) {
  editingMedId = medId || null;
  const meds = loadMeds();
  const med = medId ? meds.find(m => m.id == medId) : null;

  $('medSheetTitle').textContent = med ? '编辑药品' : '添加药品';
  $('editMedId').value = medId || '';
  $('inputMedName').value = med ? med.name : '';
  $('inputMedDesc').value = med ? med.desc : '';
  $('inputMedType').value = med ? med.type : 'sugar';

  const timeVal = med ? med.time : '08:00';
  const timeSelect = $('inputMedTime');
  const knownTimes = ['08:00','12:00','19:00','22:00'];
  if (knownTimes.includes(timeVal)) {
    timeSelect.value = timeVal;
    $('customTimeGroup').style.display = 'none';
  } else {
    timeSelect.value = 'custom';
    $('inputCustomTime').value = timeVal;
    $('customTimeGroup').style.display = 'block';
  }

  $('deleteMedBtn').hidden = !med;
  $('overlayMed').classList.add('show');
  setTimeout(() => $('inputMedName').focus(), 300);
}

$('inputMedTime').onchange = function() {
  $('customTimeGroup').style.display = this.value === 'custom' ? 'block' : 'none';
};

function saveMed() {
  const name = $('inputMedName').value.trim();
  if (!name) { showToast('请输入药品名称'); return; }

  let time = $('inputMedTime').value;
  if (time === 'custom') {
    time = $('inputCustomTime').value || '08:00';
  }

  const meds = loadMeds();
  const medId = $('editMedId').value;

  if (medId) {
    const idx = meds.findIndex(m => m.id == medId);
    if (idx > -1) {
      meds[idx] = { ...meds[idx], name, desc: $('inputMedDesc').value.trim(), time, type: $('inputMedType').value };
    }
  } else {
    meds.push({
      id: Date.now(),
      name,
      desc: $('inputMedDesc').value.trim(),
      time,
      type: $('inputMedType').value
    });
  }

  saveMeds(meds);
  $('overlayMed').classList.remove('show');
  showToast(medId ? '已更新' : '药品已添加');
  renderMedPage();
}

function deleteMed() {
  const medId = $('editMedId').value;
  if (!medId) return;
  const meds = loadMeds().filter(m => m.id != medId);
  saveMeds(meds);
  $('overlayMed').classList.remove('show');
  showToast('已删除');
  renderMedPage();
}

  const iconIdx = med.id % 4;

  $('detailContent').innerHTML = `
    <div class="drug-hero">
      <div class="drug-hero-icon">${MED_ICONS[iconIdx]}</div>
      <div class="drug-hero-name">${med.name}</div>
      <div class="drug-hero-sub">${med.desc || ''}</div>
      <div class="drug-tags">
        <div class="drug-tag">${typeLabel}</div>
        <div class="drug-tag">${getTimeLabel(med.time)}</div>
        <div class="drug-tag">${med.time}</div>
      </div>
    </div>
    <div class="info-sec">
      <h3>我的用药方案</h3>
      <div class="info-grid">
        <div class="info-cell"><div class="k">服用时间</div><div class="v">${getTimeLabel(med.time)}</div></div>
        <div class="info-cell"><div class="k">时间</div><div class="v">${med.time}</div></div>
        <div class="info-cell"><div class="k">剂量</div><div class="v">${med.desc || '--'}</div></div>
        <div class="info-cell"><div class="k">用途</div><div class="v">${typeLabel}</div></div>
      </div>
    </div>
    <div class="info-sec">
      <h3>购药渠道</h3>
    </div>
    <div class="buy-list">
      <button class="buy-item primary" onclick="showToast('即将跳转京东健康')">
        <div class="buy-icon">🏥</div>
        <div class="buy-info"><div class="buy-name">京东健康大药房</div><div class="buy-sub">正品保障 · 次日达</div></div>
        <div class="buy-arrow">›</div>
      </button>
      <button class="buy-item secondary" onclick="showToast('即将跳转阿里健康')">
        <div class="buy-icon">🛒</div>
        <div class="buy-info"><div class="buy-name">阿里健康药房</div><div class="buy-sub" style="color:var(--gray-600)">医保可报销</div></div>
        <div class="buy-arrow">›</div>
      </button>
      <button class="buy-item secondary" onclick="showToast('即将跳转叮当快药')">
        <div class="buy-icon">💉</div>
        <div class="buy-info"><div class="buy-name">叮当快药</div><div class="buy-sub" style="color:var(--gray-600)">1小时送达</div></div>
        <div class="buy-arrow">›</div>
      </button>
      <button class="btn-danger" style="margin:0" onclick="openAddMed(${med.id});switchPage('detail')">编辑药品信息</button>
    </div>`;

  currentPage = 'detail';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('pageDetail').classList.add('active');
}

// ===== 弹窗通用关闭 =====
function closeOverlay(id, e) {
  if (e.target === $(id)) $(id).classList.remove('show');
}

// ===== 初始化 =====
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth() + 1;
calSelected = now.getDate();

refreshRecord();

// Service Worker注册
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
